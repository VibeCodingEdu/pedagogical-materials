<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כניסה לניהול</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%2306B6D4'/><text x='50' y='68' text-anchor='middle' font-size='52' font-family='serif' fill='white'>📖</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#06090F;--surf:rgba(12,18,32,.7);--brd:rgba(255,255,255,.05);--c1:#F0F4F8;--c2:#7E8FA6;--c3:#3E4C5E;--accent:#06B6D4;--violet:#8B5CF6;--green:#10B981;--red:#EF4444}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--c1);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}
    .aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .aurora i{position:absolute;border-radius:50%;filter:blur(100px);opacity:.35;animation:drift 18s ease-in-out infinite alternate}
    .aurora i:nth-child(1){width:600px;height:600px;background:var(--accent);top:-15%;right:-5%;animation-duration:22s}
    .aurora i:nth-child(2){width:500px;height:500px;background:var(--violet);bottom:-10%;left:-8%;animation-duration:26s;animation-delay:-5s}
    @keyframes drift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-30px) scale(1.08)}100%{transform:translate(-20px,20px) scale(.95)}}
    .card{position:relative;z-index:1;background:var(--surf);backdrop-filter:blur(32px);border:1px solid var(--brd);border-radius:22px;padding:48px 40px;width:100%;max-width:420px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.4);animation:pop .5s cubic-bezier(.34,1.56,.64,1) both}
    @keyframes pop{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:none}}
    .mark{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--violet));margin:0 auto 24px;display:grid;place-items:center;box-shadow:0 8px 32px rgba(6,182,212,.25)}
    .mark svg{width:28px;height:28px;stroke:#fff;stroke-width:2;fill:none}
    h1{font-family:'Outfit',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:6px}
    .sub{color:var(--c2);font-size:.85rem;margin-bottom:28px;line-height:1.6}
    .g-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px 24px;border:1px solid rgba(255,255,255,.1);border-radius:14px;background:rgba(255,255,255,.05);color:var(--c1);font-family:'Heebo',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .3s}
    .g-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(6,182,212,.3);transform:translateY(-2px);box-shadow:0 8px 32px rgba(6,182,212,.15)}
    .g-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
    .g-btn svg{flex-shrink:0}
    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--c3);font-size:.76rem}.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
    .fi{width:100%;padding:12px 14px;background:rgba(12,18,32,.9);border:1.5px solid var(--brd);border-radius:14px;color:var(--c1);font-family:'Heebo',sans-serif;font-size:.86rem;outline:none;direction:rtl;transition:border .3s,box-shadow .3s;margin-bottom:12px}
    .fi:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(6,182,212,.12)}
    .fl{display:block;text-align:right;font-size:.76rem;font-weight:700;color:var(--c2);margin-bottom:4px}
    .fg{margin-bottom:4px}
    .login-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--violet));color:#fff;font-family:'Heebo',sans-serif;font-size:.86rem;font-weight:700;cursor:pointer;transition:all .3s;margin-top:4px}
    .login-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
    .login-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
    .err{color:var(--red);font-size:.78rem;margin-top:8px;min-height:20px}
    .sp{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .status{margin-top:16px;font-size:.8rem;color:var(--c2)}
    .lnk{background:none;border:none;color:var(--accent);font-size:.82rem;cursor:pointer;margin-top:12px;font-family:'Heebo',sans-serif}
    .lnk:hover{text-decoration:underline}
  </style>
</head>
<body>
<div class="aurora"><i></i><i></i></div>

<div class="card">
  <div class="mark"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
  <h1>כניסה לניהול</h1>
  <div class="sub">בחרו חשבון Google או הזינו סיסמה</div>

  <!-- Google Sign-In -->
  <div id="g_id_onload"
    data-client_id="YOUR_GOOGLE_CLIENT_ID"
    data-callback="onGoogleSignIn"
    data-auto_prompt="false">
  </div>

  <button class="g-btn" id="btnGoogle" onclick="googleSignIn()">
    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    כניסה עם חשבון Google
  </button>

  <div class="divider">או כניסה עם סיסמה</div>

  <div class="fg"><label class="fl">שם משתמש</label><input type="text" class="fi" id="inU" autocomplete="username" placeholder="Username"></div>
  <div class="fg"><label class="fl">סיסמה</label><input type="password" class="fi" id="inP" autocomplete="current-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doPasswordLogin()"></div>
  <button class="login-btn" id="btnPw" onclick="doPasswordLogin()">התחברות</button>

  <div class="err" id="errMsg"></div>
  <div class="status" id="statusMsg"></div>

  <button class="lnk" onclick="window.location.href='index.html'">חזרה לאתר</button>
</div>

<script>
  // ══════════════════════════════════════════════════
  //  CONFIG — UPDATE THESE VALUES
  // ══════════════════════════════════════════════════
  var ADMIN_URL = 'https://script.google.com/macros/s/AKfycbwFqyIMJB_DVhrY4CeVa7wIV_pVlTbBS7GGuwy62E5rtZnsXuVHKd3JI1XY6xPVMU9B/exec?page=admin';
  var API_URL = 'https://script.google.com/macros/s/AKfycbwFqyIMJB_DVhrY4CeVa7wIV_pVlTbBS7GGuwy62E5rtZnsXuVHKd3JI1XY6xPVMU9B/exec';
  var GOOGLE_CLIENT_ID = '154734372641-gsceagtnb5e2nd494tsse7us7edkuru2.apps.googleusercontent.com';
  // ══════════════════════════════════════════════════

  // Load Google Identity Services
  var gsiLoaded = false;
  (function() {
    var s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.async = true;
    s.onload = function() {
      gsiLoaded = true;
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: onGoogleSignIn
      });
    };
    document.head.appendChild(s);
  })();

  function googleSignIn() {
    if (!gsiLoaded) {
      showErr('טוען... נסה שוב בעוד שנייה');
      return;
    }
    google.accounts.id.prompt(function(notification) {
      if (notification.isNotDisplayed()) {
        // Fallback: use popup
        google.accounts.id.prompt();
      }
    });
  }

  function onGoogleSignIn(response) {
    // Decode JWT to get email
    var payload = JSON.parse(atob(response.credential.split('.')[1]));
    var email = payload.email;
    var name = payload.name || email.split('@')[0];

    showStatus('מתחבר כ-' + email + '...');
    document.getElementById('btnGoogle').disabled = true;

    // Call Apps Script to login/register by email
    jsonp('loginWithEmail', { email: email, name: name }, function(r) {
      if (r.success && r.token) {
        // Save token and redirect to admin panel
        showStatus('מעביר לדף הניהול...');
        // Pass token via sessionStorage (same origin won't work cross-domain)
        // Instead, open admin URL with token in hash
        window.location.href = ADMIN_URL + '&token=' + encodeURIComponent(r.token)
          + '&username=' + encodeURIComponent(r.username)
          + '&role=' + encodeURIComponent(r.role);
      } else {
        showErr(r.error || 'שגיאה בהתחברות');
        document.getElementById('btnGoogle').disabled = false;
      }
    });
  }

  function doPasswordLogin() {
    var u = document.getElementById('inU').value.trim();
    var p = document.getElementById('inP').value;
    if (!u || !p) return;

    var btn = document.getElementById('btnPw');
    btn.disabled = true;
    btn.innerHTML = '<span class="sp"></span> מתחבר...';

    jsonp('adminLoginJsonp', { username: u, password: p }, function(r) {
      if (r.success && r.token) {
        showStatus('מעביר לדף הניהול...');
        window.location.href = ADMIN_URL + '&token=' + encodeURIComponent(r.token)
          + '&username=' + encodeURIComponent(r.username)
          + '&role=' + encodeURIComponent(r.role);
      } else {
        showErr(r.error || 'שגיאה');
        btn.disabled = false;
        btn.textContent = 'התחברות';
      }
    });
  }

  // JSONP helper
  var _jc = 0;
  function jsonp(action, params, cb) {
    var cbName = '_cb' + (++_jc) + '_' + Date.now();
    window[cbName] = function(data) { delete window[cbName]; var el = document.getElementById(cbName); if(el) el.remove(); cb(data); };
    var url = API_URL + '?action=' + encodeURIComponent(action) + '&callback=' + cbName;
    Object.keys(params).forEach(function(k) { if(params[k]) url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k]); });
    var s = document.createElement('script'); s.id = cbName; s.src = url;
    s.onerror = function() { delete window[cbName]; s.remove(); cb({ error: 'שגיאת רשת' }); };
    document.head.appendChild(s);
  }

  function showErr(m) { document.getElementById('errMsg').textContent = m; document.getElementById('statusMsg').textContent = ''; }
  function showStatus(m) { document.getElementById('statusMsg').textContent = m; document.getElementById('errMsg').textContent = ''; }
</script>
</body>
</html>
